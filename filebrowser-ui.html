<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw File Browser</title>
    <style>
      :root {
        --bg: #18181b;
        --bg-alt: #1f1f23;
        --bg-hover: #27272a;
        --border: #27272a;
        --text: #e4e4e7;
        --text-muted: #a1a1aa;
        --text-dim: #71717a;
        --accent: #a855f7;
        --accent-dim: #7c3aed;
        --danger: #ef4444;
        --success: #22c55e;
        --warning: #eab308;
        --radius: 8px;
        --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        background: var(--bg-alt);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .toolbar h1 {
        font-size: 1rem;
        font-weight: 600;
        white-space: nowrap;
        margin-right: auto;
        background: linear-gradient(135deg, var(--accent), #d946ef);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .toolbar-actions {
        display: flex;
        gap: 0.4rem;
      }

      .btn {
        padding: 0.3rem 0.6rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        font-size: 0.813rem;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        white-space: nowrap;
        transition: background 0.15s, border-color 0.15s;
      }

      .btn:hover { background: var(--bg-hover); }
      .btn:active { background: #333; }
      .btn:disabled { opacity: 0.4; cursor: default; }
      .btn-icon { padding: 0.3rem 0.5rem; }
      .btn-primary { background: var(--accent-dim); border-color: var(--accent); }
      .btn-primary:hover { background: var(--accent); }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        flex-wrap: wrap;
        padding: 0.5rem 1rem;
        background: var(--bg-alt);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        font-size: 0.813rem;
      }

      .breadcrumb a {
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
      }

      .breadcrumb a:hover { text-decoration: underline; }
      .breadcrumb span.sep { color: var(--text-dim); }
      .breadcrumb span.current { color: var(--text-muted); }

      .root-selector {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0 1rem 0.5rem;
        background: var(--bg-alt);
        flex-shrink: 0;
      }

      .root-selector select {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.25rem 0.5rem;
        font-size: 0.813rem;
      }

      .main {
        flex: 1;
        overflow-y: auto;
        position: relative;
      }

      .file-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      .file-table th {
        position: sticky;
        top: 0;
        background: var(--bg);
        border-bottom: 2px solid var(--border);
        padding: 0.5rem 1rem;
        text-align: left;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        z-index: 2;
      }

      .file-table td {
        padding: 0.375rem 1rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }

      .file-table tr:hover td { background: var(--bg-hover); }

      .file-table .name-cell {
        cursor: pointer;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .file-table .name-cell.dir { color: var(--accent); font-weight: 500; }

      .file-table .icon {
        font-size: 1.125rem;
        width: 1.5rem;
        text-align: center;
        flex-shrink: 0;
      }

      .file-table .size { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.75rem; white-space: nowrap; }
      .file-table .type { color: var(--text-dim); font-size: 0.75rem; }
      .file-table .perm { color: var(--text-dim); font-size: 0.7rem; font-family: var(--font-mono); }
      .file-table .size-col { width: 100px; }
      .file-table .type-col { width: 100px; }
      .file-table .perm-col { width: 110px; }

      .viewer {
        padding: 1rem;
        overflow: auto;
        font-family: var(--font-mono);
        font-size: 0.813rem;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
        max-height: 100%;
      }

      .viewer-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        background: var(--bg-alt);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .viewer-header .filename { font-weight: 600; color: var(--accent); font-size: 0.875rem; }
      .viewer-header .meta { color: var(--text-muted); font-size: 0.75rem; margin-left: auto; }

      .status-bar {
        padding: 0.4rem 1rem;
        background: var(--bg-alt);
        border-top: 1px solid var(--border);
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        gap: 1.5rem;
        flex-shrink: 0;
      }

      .status-bar span { white-space: nowrap; }
      .status-bar .enabled { color: var(--success); }
      .status-bar .disabled { color: var(--danger); }

      .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 60%;
        color: var(--text-dim);
        font-size: 0.938rem;
        flex-direction: column;
        gap: 0.5rem;
      }

      .placeholder .icon-placeholder { font-size: 2.5rem; opacity: 0.3; }

      .loading-indicator {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 0.5rem;
        text-align: center;
        color: var(--accent);
        font-size: 0.75rem;
        background:rgba(0,0,0,0.4);
        z-index: 5;
      }

      pre.line-numbers { counter-reset: line; }
      pre.line-numbers code { display: block; }
      pre.line-numbers .line::before {
        counter-increment: line;
        content: counter(line);
        display: inline-block;
        width: 3rem;
        text-align: right;
        margin-right: 1rem;
        color: var(--text-dim);
        user-select: none;
      }

      .sort-icon { opacity: 0.3; font-size: 0.7rem; }

      @media (max-width: 640px) {
        .file-table .size-col,
        .file-table .perm-col { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <h1>📁 File Browser</h1>
      <div class="toolbar-actions">
        <button class="btn" onclick="goUp()" title="Go up">⬆ Parent</button>
        <button class="btn btn-icon" onclick="navigateTo('/')" title="Root">🏠</button>
        <button class="btn" onclick="refresh()" title="Refresh">🔄</button>
      </div>
    </div>

    <div class="root-selector" id="rootSelector" style="display:none">
      <span style="color: var(--text-muted); font-size: 0.813rem;">Root:</span>
      <select id="rootSelect" onchange="changeRoot(this.value)"></select>
    </div>

    <div class="breadcrumb" id="breadcrumb"></div>

    <div class="main" id="mainArea">
      <div class="placeholder" id="loading">
        <div class="icon-placeholder">📂</div>
        <span>Loading…</span>
      </div>
    </div>

    <div class="status-bar">
      <span id="statusEnabled">⏳ Loading...</span>
      <span id="statusRoots"></span>
      <span id="statusPath"></span>
    </div>

    <script>
      // State
      let currentRoot = null;
      let currentPath = '';
      let currentDirEntries = [];
      let roots = [];
      let currentView = 'browser'; // 'browser' | 'file'
      let viewingFile = null;
      let loading = false;
      let sortField = 'name';
      let sortAsc = true;

      // Auto-extract base for API calls
      const BASE = window.location.pathname.replace(/\/+$/, '');

      // Init
      fetchStatus();

      function fetchStatus() {
        fetch(`${BASE}/api/status`, { credentials: 'include' })
          .then(r => r.json())
          .then(data => {
            const s = data.result || data;
            document.getElementById('statusEnabled').innerHTML = s.enabled
              ? '<span class="enabled">● Enabled</span>'
              : '<span class="disabled">● Disabled</span>';

            roots = s.roots || [];
            document.getElementById('statusRoots').textContent = roots.length + ' root(s)';

            if (roots.length === 0) {
              document.getElementById('mainArea').innerHTML =
                '<div class="placeholder"><div class="icon-placeholder">⚠️</div><span>No roots configured. Add <code>roots</code> to the plugin config.</span></div>';
              return;
            }

            if (roots.length === 1) {
              currentRoot = roots[0];
              document.getElementById('rootSelector').style.display = 'none';
            } else {
              const sel = document.getElementById('rootSelect');
              sel.innerHTML = roots.map((r, i) =>
                `<option value="${i}">${escapeHtml(r)}</option>`
              ).join('');
              document.getElementById('rootSelector').style.display = 'flex';
              if (!currentRoot) currentRoot = roots[0];
            }

            navigateTo('/');
          })
          .catch(err => {
            document.getElementById('mainArea').innerHTML =
              '<div class="placeholder"><div class="icon-placeholder">❌</div><span>Failed to connect: ' + escapeHtml(String(err)) + '</span></div>';
          });
      }

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      // HTTP API wrappers (paths relative to BASE)
      function apiList(root, dirPath) {
        const p = encodeURIComponent(root || '');
        const d = encodeURIComponent(dirPath || '.');
        return fetch(`${BASE}/api/list?root=${p}&path=${d}`, { credentials: 'include' })
          .then(r => r.json());
      }
      function apiRead(root, filePath) {
        const p = encodeURIComponent(root || '');
        const f = encodeURIComponent(filePath || '.');
        return fetch(`${BASE}/api/read?root=${p}&path=${f}`, { credentials: 'include' })
          .then(r => r.json());
      }

      function navigateTo(dirPath) {
        if (!currentRoot) return;
        currentPath = dirPath || '/';
        currentView = 'browser';
        loadDirectory(dirPath);
      }

      function goUp() {
        if (!currentPath || currentPath === '/' || currentPath === '') return;
        const parent = currentPath.split('/').slice(0, -1).join('/') || '/';
        navigateTo(parent);
      }

      function loadDirectory(dirPath) {
        if (!currentRoot) return;
        setLoading(true);
        currentPath = dirPath || '/';

        apiList(currentRoot, dirPath || '.').then(data => {
          const result = data.result || data;
          if (data.error) {
            showError(String(data.error.message || data.error));
            return;
          }
          currentDirEntries = (result.entries || []).sort(defaultSort);
          renderDirectory(result.root || currentRoot, result.path || currentPath);
          updateBreadcrumb(currentPath);
        }).catch(err => {
          showError(String(err));
        }).finally(() => setLoading(false));
      }

      function defaultSort(a, b) {
        const dirsFirst = (b.type === 'directory' ? 1 : 0) - (a.type === 'directory' ? 1 : 0);
        return dirsFirst || a.name.localeCompare(b.name);
      }

      function renderDirectory(root, dirPath) {
        setLoading(false);
        const main = document.getElementById('mainArea');
        if (!currentDirEntries.length) {
          main.innerHTML =
            '<div class="placeholder"><div class="icon-placeholder">📭</div><span>This directory is empty</span></div>';
          updateBreadcrumb(currentPath);
          return;
        }

        const rows = currentDirEntries.map(entry => {
          const isDir = entry.type === 'directory';
          const isFile = entry.type === 'file';
          const icon = isDir ? '📁' : isFile ? '📄' : '❓';
          const cls = isDir ? 'dir' : '';
          const displaySize = isFile ? formatSize(entry.size || 0) : '—';
          const fileType = isDir ? 'directory' : getFileType(entry.name);
          const encoded = encodeURIComponent(entry.name);

          return `
            <tr>
              <td>
                <span class="name-cell ${cls}" onclick="enterEntry('${escapeHtml(entry.name)}', '${isDir}')">
                  <span class="icon">${icon}</span>
                  <span>${escapeHtml(entry.name)}</span>
                </span>
              </td>
              <td class="size-col size">${escapeHtml(displaySize)}</td>
              <td class="type-col type">${escapeHtml(fileType)}</td>
              <td class="perm-col perm">${entry.permissions || '———'}</td>
            </tr>`;
        }).join('');

        main.innerHTML = `
          <table class="file-table">
            <thead>
              <tr>
                <th onclick="toggleSort('name')">Name <span class="sort-icon">${sortField === 'name' ? (sortAsc ? '▲' : '▼') : '⇅'}</span></th>
                <th class="size-col" onclick="toggleSort('size')">Size <span class="sort-icon">${sortField === 'size' ? (sortAsc ? '▲' : '▼') : '⇅'}</span></th>
                <th class="type-col" onclick="toggleSort('type')">Type <span class="sort-icon">${sortField === 'type' ? (sortAsc ? '▲' : '▼') : '⇅'}</span></th>
                <th class="perm-col">Perms</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      function enterEntry(name, isDir) {
        const nextPath = currentPath === '/'
          ? '/' + name
          : (currentPath || '') + '/' + name;

        if (isDir) {
          navigateTo(nextPath);
        } else {
          previewFile(name, nextPath);
        }
      }

      function previewFile(name, filePath) {
        setLoading(true);
        currentView = 'file';
        viewingFile = { name, path: filePath };

        apiRead(currentRoot, filePath).then(data => {
          setLoading(false);
          if (data.error) {
            showError(String(data.error.message || data.error));
            return;
          }
          const result = data.result || data;
          const content = result.content || '';
          renderFilePreview(result.root || currentRoot, filePath, content, result.bytes || 0);
        }).catch(err => {
          setLoading(false);
          showError(String(err));
        });
      }

      function renderFilePreview(root, filePath, content, byteCount) {
        const main = document.getElementById('mainArea');
        const fileName = filePath.split('/').pop();
        const lines = content.split('\n');
        const numbered = lines.map((line, i) =>
          `<span class="line">${escapeHtml(line)}</span>\n`
        ).join('');

        main.innerHTML = `
          <div class="viewer-header">
            <span style="cursor:pointer" onclick="navigateTo('${currentPath.split('/').slice(0, -1).join('/') || '/'}')">← Back</span>
            <span class="filename">📄 ${escapeHtml(fileName)}</span>
            <span class="meta">${formatSize(byteCount)} · ${lines.length} line${lines.length !== 1 ? 's' : ''}</span>
          </div>
          <pre class="viewer"><code class="line-numbers">${numbered}</code></pre>`;

        updateBreadcrumb(filePath);
      }

      function showError(msg) {
        document.getElementById('mainArea').innerHTML =
          `<div class="placeholder"><div class="icon-placeholder">⚠️</div><span>${escapeHtml(msg)}</span></div>`;
      }

      function refresh() {
        if (currentView === 'file' && viewingFile) {
          previewFile(viewingFile.name, viewingFile.path);
        } else {
          loadDirectory(currentPath);
        }
      }

      function setLoading(flag) {
        loading = flag || false;
        const el = document.getElementById('loading');
        if (flag) {
          el.style.display = 'block';
          el.innerHTML = '<div class="loading-indicator">⏳ Loading…</div>';
        } else {
          el.style.display = 'none';
        }
      }

      function changeRoot(idx) {
        currentRoot = roots[parseInt(idx)] || roots[0];
        navigateTo('/');
      }

      function updateBreadcrumb(filePath) {
        const bc = document.getElementById('breadcrumb');
        let items;
        if (filePath === '/' || filePath === '') {
          bc.innerHTML = '<span class="current">/</span>';
          document.getElementById('statusPath').textContent = '/';
          return;
        }
        const parts = filePath.split('/').filter(Boolean);
        let cumPath = '';
        let html = `<a onclick="navigateTo('/')">🏠</a>`;
        parts.forEach((p, i) => {
          cumPath += '/' + p;
          html += ' <span class="sep">/</span> ';
          if (i === parts.length - 1) {
            html += `<span class="current">${escapeHtml(p)}</span>`;
          } else {
            html += `<a onclick="navigateTo('${escapeHtml(cumPath)}')">${escapeHtml(p)}</a>`;
          }
        });
        bc.innerHTML = html;
        document.getElementById('statusPath').textContent = filePath;
      }

      function toggleSort(field) {
        if (sortField === field) {
          sortAsc = !sortAsc;
        } else {
          sortField = field;
          sortAsc = true;
        }
        const mult = sortAsc ? 1 : -1;
        currentDirEntries.sort((a, b) => {
          if (field === 'name') return mult * a.name.localeCompare(b.name);
          if (field === 'size') return mult * ((a.size || 0) - (b.size || 0));
          if (field === 'type') return mult * getFileType(a.name).localeCompare(getFileType(b.name));
          return 0;
        });
        renderDirectory(currentRoot, currentPath);
      }

      function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
      }

      function getFileType(name) {
        const ext = ((name || '').split('.').pop() || '').toLowerCase();
        const map = {
          js: 'JavaScript', ts: 'TypeScript', jsx: 'JSX', tsx: 'TSX', json: 'JSON',
          css: 'CSS', html: 'HTML', htm: 'HTML', xml: 'XML', svg: 'SVG',
          md: 'Markdown', txt: 'Text', log: 'Log', yml: 'YAML', yaml: 'YAML',
          toml: 'TOML', ini: 'INI', cfg: 'Config', py: 'Python', rb: 'Ruby',
          rs: 'Rust', go: 'Go', java: 'Java', c: 'C', cpp: 'C++', h: 'Header',
          sh: 'Shell', bash: 'Bash', sql: 'SQL', graphql: 'GraphQL', gql: 'GraphQL',
          png: 'PNG img', jpg: 'JPEG img', jpeg: 'JPEG img', gif: 'GIF img',
          webp: 'WebP img', ico: 'ICO', pdf: 'PDF doc', docx: 'Word doc',
          env: 'Env', lock: 'Lock', gitignore: 'Git', dockerfile: 'Docker',
          csv: 'CSV', proto: 'Protobuf',
        };
        return map[ext] || ext.toUpperCase();
      }

      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
      }

      fetchStatus();
    </script>
  </body>
</html>
